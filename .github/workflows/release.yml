name: release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        type: choice
        default: patch
        options:
          - major
          - minor
          - patch

permissions:
  contents: write
  id-token: write

env:
  CH57X_KEYBOARD_TOOL_VERSION: 1.7.0

jobs:
  prepare-release:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm ci --ignore-scripts
      - run: npm run lint
      - run: npm test
      - name: Bump release version
        id: bump
        shell: bash
        run: |
          set -euo pipefail
          npm version "${{ github.event.inputs.bump }}" --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          VERSION="$VERSION" node <<'NODE'
          const fs = require('node:fs')
          const path = require('node:path')

          const version = process.env.VERSION
          const root = process.cwd()
          const rootPackagePath = path.join(root, 'package.json')
          const rootPackage = JSON.parse(fs.readFileSync(rootPackagePath, 'utf8'))

          rootPackage.version = version
          for (const dependencyName of Object.keys(rootPackage.optionalDependencies || {})) {
            if (dependencyName.startsWith('@clawkeys/ck-')) {
              rootPackage.optionalDependencies[dependencyName] = version
            }
          }

          fs.writeFileSync(rootPackagePath, `${JSON.stringify(rootPackage, null, 2)}\n`)

          const npmDirectory = path.join(root, 'npm')
          for (const entry of fs.readdirSync(npmDirectory)) {
            const packagePath = path.join(npmDirectory, entry, 'package.json')
            const packageJson = JSON.parse(fs.readFileSync(packagePath, 'utf8'))
            packageJson.version = version
            fs.writeFileSync(packagePath, `${JSON.stringify(packageJson, null, 2)}\n`)
          }
          NODE
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: release-manifests
          path: |
            package.json
            package-lock.json
            npm/*/package.json
          if-no-files-found: error

  build-native-packages:
    needs: prepare-release
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            platform: darwin-arm64
            target: aarch64-apple-darwin
            package_dir: darwin-arm64
          - runner: macos-14
            platform: darwin-x64
            target: x86_64-apple-darwin
            package_dir: darwin-x64
          - runner: ubuntu-24.04
            platform: linux-x64-gnu
            target: x86_64-unknown-linux-gnu
            package_dir: linux-x64-gnu
          - runner: ubuntu-24.04-arm
            platform: linux-arm64-gnu
            target: aarch64-unknown-linux-gnu
            package_dir: linux-arm64-gnu
          - runner: windows-latest
            platform: win32-x64-msvc
            target: x86_64-pc-windows-msvc
            package_dir: win32-x64-msvc
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: release-manifests
          path: .
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: npm install --ignore-scripts
      - name: Build native package for platform
        run: npm run build:napi -- --target ${{ matrix.target }}
      - name: Build bundled helper binary
        shell: bash
        run: |
          set -euo pipefail
          HELPER_ROOT="$PWD/.artifacts/ch57x-keyboard-tool"
          rm -rf "$HELPER_ROOT"
          cargo install ch57x-keyboard-tool --version "$CH57X_KEYBOARD_TOOL_VERSION" --locked --root "$HELPER_ROOT" --target ${{ matrix.target }}
      - name: Stage platform binary for package
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f crates/native/clawkeys.${{ matrix.platform }}.node ]; then
            echo "Missing expected native artifact: crates/native/clawkeys.${{ matrix.platform }}.node"
            ls -la crates/native
            exit 1
          fi

          HELPER_NAME=ch57x-keyboard-tool
          if [[ "${{ matrix.platform }}" == win32-* ]]; then
            HELPER_NAME="${HELPER_NAME}.exe"
          fi

          HELPER_PATH="$PWD/.artifacts/ch57x-keyboard-tool/bin/$HELPER_NAME"
          if [ ! -f "$HELPER_PATH" ]; then
            echo "Missing expected helper artifact: $HELPER_PATH"
            ls -la "$PWD/.artifacts/ch57x-keyboard-tool/bin"
            exit 1
          fi

          cp crates/native/clawkeys.${{ matrix.platform }}.node npm/${{ matrix.package_dir }}/
          cp "$HELPER_PATH" "npm/${{ matrix.package_dir }}/$HELPER_NAME"

          if [[ "$HELPER_NAME" != *.exe ]]; then
            chmod +x "npm/${{ matrix.package_dir }}/$HELPER_NAME"
          fi
      - name: Publish native package
        run: npm publish ./npm/${{ matrix.package_dir }} --access public --provenance

  publish-root:
    needs:
      - prepare-release
      - build-native-packages
    permissions:
      contents: write
      id-token: write
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: release-manifests
          path: .
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm install --ignore-scripts
      - run: npm run build:ts
      - run: npm run lint
      - name: Publish root package
        run: npm publish --access public --provenance
      - name: Commit version bump and tag release
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- package.json package-lock.json npm/*/package.json; then
            echo "No package version changes found."
            exit 0
          fi

          git add package.json package-lock.json npm/*/package.json
          git commit -m "chore: release v${{ needs.prepare-release.outputs.version }}"
          git tag "v${{ needs.prepare-release.outputs.version }}"
          git push origin "HEAD:${{ github.ref_name }}"
          git push origin "v${{ needs.prepare-release.outputs.version }}"
